<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Planner - Miembros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- Login Section -->
    <div id="login-overlay" class="login-overlay active">
        <div class="login-card glass">
            <div class="login-header">
                <span class="login-icon">🔑</span>
                <h2>Acceso</h2>
                <p>Ingresa tus credenciales para continuar</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label>Usuario</label>
                    <input type="text" id="username" placeholder="Tu usuario" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary full-width">Iniciar Sesión</button>
                <div id="login-error" class="error-msg hidden">Usuario o contraseña incorrectos.</div>
            </form>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <header>
            <div class="user-bar">
                <span id="user-display">Bienvenido</span>
                <button id="logout-btn" class="btn-text">Cerrar Sesión</button>
            </div>
            <div class="logo">
                <span class="icon">🎂</span>
                <h1>Birthday<span>Tracker</span></h1>
            </div>
            <p class="subtitle">Encuentra a los miembros que cumplen años</p>
        </header>

        <section class="controls glass">
            <div class="control-group">
                <label for="month-select">Mes</label>
                <select id="month-select">
                    <option value="">Selecciona Mes</option>
                </select>
            </div>
            <div class="control-group">
                <label for="day-select">Día</label>
                <select id="day-select">
                    <option value="">Selecciona Día</option>
                </select>
            </div>
            <button id="search-btn" class="btn-primary">
                <span class="btn-icon">🔍</span> Buscar
            </button>
        </section>

        <main class="results-container">
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Cargando miembros...</p>
            </div>
            <div id="results-grid" class="grid-container">
                <!-- Grid items will be injected here -->
                <div class="empty-state">
                    <p>Selecciona un mes y un día para ver los resultados.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
