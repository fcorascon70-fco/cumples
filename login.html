<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Visor de Cumpleaños</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 py-8 text-center text-white">
            <h1 class="text-3xl font-bold tracking-tight mb-2">🎉 Bienvenido</h1>
            <p class="text-blue-100 text-sm px-4">Ingresa tus credenciales para acceder al Visor de Cumpleaños</p>
        </div>

        <div class="p-8">
            <form id="login-form" class="space-y-6">
                <!-- Error Message Container -->
                <div id="error-message"
                    class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-100 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                            clip-rule="evenodd"></path>
                    </svg>
                    <span id="error-text">Credenciales incorrectas.</span>
                </div>

                <div>
                    <label for="usuario" class="block text-sm font-medium text-gray-700 mb-2">Usuario</label>
                    <input id="usuario" name="usuario" type="text" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                        placeholder="tusuario">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <input id="password" name="password" type="password" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                        placeholder="••••••••">
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors flex justify-center items-center">
                    <span>Iniciar Sesión</span>
                    <svg id="loading-spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden"
                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Revisa si ya está logueado para redirigir directamente
            fetch('api_check_session.php')
                .then(r => r.json())
                .then(data => {
                    if (data.logged_in) {
                        window.location.href = 'index.html';
                    }
                });

            const form = document.getElementById('login-form');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const submitBtn = document.getElementById('submit-btn');
            const spinner = document.getElementById('loading-spinner');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const usuario = document.getElementById('usuario').value;
                const password = document.getElementById('password').value;

                // UI state
                errorMessage.classList.add('hidden');
                submitBtn.disabled = true;
                spinner.classList.remove('hidden');

                try {
                    const response = await fetch('api_login.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ usuario, password })
                    });

                    const data = await response.json();

                    if (data.success) {
                        window.location.href = 'index.html';
                    } else {
                        throw new Error(data.message || 'Error al iniciar sesión.');
                    }
                } catch (error) {
                    errorText.textContent = error.message;
                    errorMessage.classList.remove('hidden');
                    submitBtn.disabled = false;
                    spinner.classList.add('hidden');
                }
            });
        });
    </script>
</body>

</html>
